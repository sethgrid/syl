<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 70%; padding: 0.6rem 1rem; border-radius: 1rem; line-height: 1.5; }
    .msg.user { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
    .msg.assistant { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 0.25rem; }
    /* Markdown rendering inside assistant bubbles */
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { margin: 0.5rem 0 0.25rem; font-weight: 600; }
    .msg.assistant h1 { font-size: 1.2em; }
    .msg.assistant h2 { font-size: 1.1em; }
    .msg.assistant h3 { font-size: 1em; }
    .msg.assistant p { margin: 0.25rem 0; }
    .msg.assistant p:first-child { margin-top: 0; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { margin: 0.25rem 0 0.25rem 1.25rem; }
    .msg.assistant li { margin: 0.1rem 0; }
    .msg.assistant pre { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 0.4rem; padding: 0.6rem 0.8rem; margin: 0.4rem 0; overflow-x: auto; }
    .msg.assistant code { font-family: 'Menlo', 'Monaco', monospace; font-size: 0.85em; }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant :not(pre) > code { background: #2a2a2a; padding: 0.1em 0.35em; border-radius: 0.25rem; }
    .msg.assistant strong { font-weight: 600; }
    .msg.assistant em { font-style: italic; }
    .msg.assistant hr { border: none; border-top: 1px solid #333; margin: 0.5rem 0; }
    #status { font-size: 0.75rem; color: #555; text-align: center; padding: 0.25rem; cursor: pointer; }
    #input-row { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; border-top: 1px solid #222; background: #0f0f0f; }
    #text-input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 0.5rem; color: #e0e0e0; padding: 0.6rem 1rem; font-size: 1rem; }
    #send-btn { background: #1e3a5f; border: none; color: #e0e0e0; padding: 0.6rem 1.2rem; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
    #send-btn:hover { background: #2a4f7a; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #debug-log { display: none; background: #111; border-top: 1px solid #333; font-size: 0.65rem; font-family: monospace; color: #888; max-height: 120px; overflow-y: auto; padding: 0.5rem; }
    #debug-log.visible { display: block; }
    #debug-log div { padding: 1px 0; }
    #debug-log div.err { color: #e06c6c; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div id="status">connecting…</div>
  <div id="debug-log"></div>
  <div id="input-row">
    <input id="text-input" type="text" autofocus disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script>
    // Named agent from URL: ?agent=<name>. Empty string = anonymous (fingerprint-isolated).
    const agentName = new URLSearchParams(window.location.search).get('agent') || '';
    const displayName = agentName || 'syl';
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    document.title = 'Syl · ' + cap(displayName);
    document.getElementById('text-input').placeholder = 'Message ' + cap(displayName) + '\u2026';

    // Persistent per-browser identity.
    // crypto.randomUUID() requires HTTPS in Safari — use a manual fallback for HTTP LAN.
    function randomUUID() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    let fingerprint = localStorage.getItem('syl_fp');
    if (!fingerprint) {
      fingerprint = randomUUID();
      localStorage.setItem('syl_fp', fingerprint);
    }

    let agentID = null;
    let currentMsg = null;
    let eventSource = null;

    const statusEl   = document.getElementById('status');
    const inputEl    = document.getElementById('text-input');
    const sendBtn    = document.getElementById('send-btn');
    const debugLogEl = document.getElementById('debug-log');

    function dbg(msg, isErr) {
      const el = document.createElement('div');
      el.textContent = new Date().toISOString().slice(11, 23) + ' ' + msg;
      if (isErr) el.className = 'err';
      debugLogEl.appendChild(el);
      debugLogEl.scrollTop = debugLogEl.scrollHeight;
      console.log('[syl]', msg);
    }

    // Double-tap the status bar to toggle the debug log.
    statusEl.addEventListener('dblclick', () => debugLogEl.classList.toggle('visible'));

    function setStatus(text) { statusEl.textContent = text; dbg('status → ' + text); }

    function enable() {
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Minimal markdown → HTML renderer (no dependencies, LAN-safe).
    // Handles the subset Claude typically produces.
    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function mdToHtml(raw) {
      // Protect code blocks from inline transforms.
      const blocks = [];
      let s = raw.replace(/```(?:[^\n]*\n)?([\s\S]*?)```/g, (_, code) => {
        blocks.push('<pre><code>' + esc(code.replace(/\n$/, '')) + '</code></pre>');
        return '\x00' + (blocks.length - 1) + '\x00';
      });

      // Inline code.
      s = s.replace(/`([^`\n]+)`/g, (_, c) => '<code>' + esc(c) + '</code>');

      // Headers.
      s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
      s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

      // Horizontal rule.
      s = s.replace(/^[-*_]{3,}$/gm, '<hr>');

      // Bold + italic, bold, italic.
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');

      // Lists — collect consecutive items then wrap.
      s = s.replace(/((?:^[ \t]*[-*] .+(?:\n|$))+)/gm, m => {
        const items = m.trim().split('\n')
          .map(l => '<li>' + l.replace(/^[ \t]*[-*] /, '') + '</li>')
          .join('');
        return '<ul>' + items + '</ul>\n';
      });
      s = s.replace(/((?:^[ \t]*\d+\. .+(?:\n|$))+)/gm, m => {
        const items = m.trim().split('\n')
          .map(l => '<li>' + l.replace(/^[ \t]*\d+\. /, '') + '</li>')
          .join('');
        return '<ol>' + items + '</ol>\n';
      });

      // Wrap remaining plain-text lines in <p>, collapsing blank lines.
      const blockTags = /^<(h[1-3]|ul|ol|pre|hr|p)/;
      const out = [];
      let para = [];
      for (const line of s.split('\n')) {
        if (line.trim() === '') {
          if (para.length) { out.push('<p>' + para.join('<br>') + '</p>'); para = []; }
        } else if (blockTags.test(line.trim()) || line.startsWith('\x00')) {
          if (para.length) { out.push('<p>' + para.join('<br>') + '</p>'); para = []; }
          out.push(line);
        } else {
          para.push(line);
        }
      }
      if (para.length) out.push('<p>' + para.join('<br>') + '</p>');

      // Restore code blocks.
      return out.join('\n').replace(/\x00(\d+)\x00/g, (_, i) => blocks[+i]);
    }

    function appendMsg(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      if (role === 'assistant') {
        el.innerHTML = mdToHtml(text);
      } else {
        el.textContent = text;
      }
      document.getElementById('chat').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    function connectSSE(aid) {
      if (eventSource) eventSource.close();
      dbg('EventSource opening agent_id=' + aid);
      eventSource = new EventSource('/sse?agent_id=' + aid);

      eventSource.onopen = () => {
        dbg('onopen fired readyState=' + eventSource.readyState);
        setStatus('connected');
        enable();
      };

      eventSource.addEventListener('ready', () => {
        dbg('ready event fired');
        setStatus('connected');
        enable();
      });

      eventSource.onerror = () => {
        dbg('onerror readyState=' + eventSource.readyState, true);
        setStatus('reconnecting…');
        inputEl.disabled = true;
        sendBtn.disabled = true;
      };

      eventSource.onmessage = (e) => {
        dbg('message: ' + e.data.slice(0, 60));
        const evt = JSON.parse(e.data);
        if (evt.type === 'token') {
          if (!currentMsg) {
            currentMsg = document.createElement('div');
            currentMsg.className = 'msg assistant';
            currentMsg.dataset.raw = '';
            document.getElementById('chat').appendChild(currentMsg);
          }
          currentMsg.dataset.raw += evt.content;
          currentMsg.innerHTML = mdToHtml(currentMsg.dataset.raw);
          currentMsg.scrollIntoView({ behavior: 'smooth' });
        } else if (evt.type === 'done') {
          currentMsg = null;
        } else if (evt.type === 'error') {
          appendMsg('assistant', '[error] ' + evt.content);
          currentMsg = null;
        }
      };
    }

    async function loadHistory(aid) {
      try {
        const res = await fetch('/history?agent_id=' + aid);
        if (!res.ok) throw new Error('history ' + res.status);
        const items = await res.json();
        for (const item of items) {
          if (item.role === 'user' || item.role === 'assistant') {
            appendMsg(item.role, item.content);
          }
        }
        if (items.length > 0) {
          document.getElementById('chat').lastElementChild?.scrollIntoView({ behavior: 'instant' });
        }
      } catch (err) {
        dbg('loadHistory error: ' + err.message, true);
      }
    }

    async function init() {
      try {
        dbg('fetching session fp=' + fingerprint.slice(0,8) + '…');
        const sessionURL = '/session?fingerprint=' + encodeURIComponent(fingerprint) +
          (agentName ? '&name=' + encodeURIComponent(agentName) : '');
        const res = await fetch(sessionURL);
        if (!res.ok) throw new Error('session ' + res.status);
        const data = await res.json();
        agentID = data.agent_id;
        dbg('session ok agent_id=' + agentID);
        await loadHistory(agentID);
        connectSSE(agentID);
      } catch (err) {
        dbg('init error: ' + err.message, true);
        setStatus('error: ' + err.message);
      }
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || !agentID) return;
      inputEl.value = '';
      appendMsg('user', text);

      const res = await fetch('/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, fingerprint, ...(agentName ? { agent_name: agentName } : {}) }),
      });
      if (!res.ok) {
        appendMsg('assistant', '[error] message failed (' + res.status + ')');
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    init();
  </script>
</body>
</html>
