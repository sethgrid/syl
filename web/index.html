<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 70%; padding: 0.6rem 1rem; border-radius: 1rem; line-height: 1.5; }
    .msg.user { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
    .msg.assistant { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 0.25rem; }
    #status { font-size: 0.75rem; color: #555; text-align: center; padding: 0.25rem; cursor: pointer; }
    #input-row { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; border-top: 1px solid #222; background: #0f0f0f; }
    #text-input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 0.5rem; color: #e0e0e0; padding: 0.6rem 1rem; font-size: 1rem; }
    #send-btn { background: #1e3a5f; border: none; color: #e0e0e0; padding: 0.6rem 1.2rem; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
    #send-btn:hover { background: #2a4f7a; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #debug-log { display: block; background: #111; border-top: 1px solid #333; font-size: 0.65rem; font-family: monospace; color: #888; max-height: 120px; overflow-y: auto; padding: 0.5rem; }
    #debug-log div { padding: 1px 0; }
    #debug-log div.err { color: #e06c6c; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div id="status">connecting…</div>
  <div id="debug-log"></div>
  <div id="input-row">
    <input id="text-input" type="text" placeholder="Message Syl…" autofocus disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script>
    // Persistent per-browser identity.
    // crypto.randomUUID() requires HTTPS in Safari — use a manual fallback for HTTP LAN.
    function randomUUID() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    let fingerprint = localStorage.getItem('syl_fp');
    if (!fingerprint) {
      fingerprint = randomUUID();
      localStorage.setItem('syl_fp', fingerprint);
    }

    let agentID = null;
    let currentMsg = null;
    let eventSource = null;

    const statusEl   = document.getElementById('status');
    const inputEl    = document.getElementById('text-input');
    const sendBtn    = document.getElementById('send-btn');
    const debugLogEl = document.getElementById('debug-log');

function dbg(msg, isErr) {
      const el = document.createElement('div');
      el.textContent = new Date().toISOString().slice(11, 23) + ' ' + msg;
      if (isErr) el.className = 'err';
      debugLogEl.appendChild(el);
      debugLogEl.scrollTop = debugLogEl.scrollHeight;
      console.log('[syl]', msg);
    }

    function setStatus(text) { statusEl.textContent = text; dbg('status → ' + text); }

    function enable() {
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function appendMsg(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      document.getElementById('chat').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    function connectSSE(aid) {
      if (eventSource) eventSource.close();
      dbg('EventSource opening agent_id=' + aid);
      eventSource = new EventSource('/sse?agent_id=' + aid);

      // onopen fires on desktop browsers when HTTP 200 headers arrive.
      // iOS Safari often skips it — we also listen for the named 'ready' event.
      eventSource.onopen = () => {
        dbg('onopen fired readyState=' + eventSource.readyState);
        setStatus('connected');
        enable();
      };

      eventSource.addEventListener('ready', () => {
        dbg('ready event fired');
        setStatus('connected');
        enable();
      });

      eventSource.onerror = (e) => {
        dbg('onerror readyState=' + eventSource.readyState, true);
        setStatus('reconnecting…');
        inputEl.disabled = true;
        sendBtn.disabled = true;
      };

      eventSource.onmessage = (e) => {
        dbg('message: ' + e.data.slice(0, 60));
        const evt = JSON.parse(e.data);
        if (evt.type === 'token') {
          if (!currentMsg) currentMsg = appendMsg('assistant', '');
          currentMsg.textContent += evt.content;
          currentMsg.scrollIntoView({ behavior: 'smooth' });
        } else if (evt.type === 'done') {
          currentMsg = null;
        } else if (evt.type === 'error') {
          appendMsg('assistant', '[error] ' + evt.content);
          currentMsg = null;
        }
      };
    }

    async function init() {
      try {
        dbg('fetching session fp=' + fingerprint.slice(0,8) + '…');
        const res = await fetch('/session?fingerprint=' + encodeURIComponent(fingerprint));
        if (!res.ok) throw new Error('session ' + res.status);
        const data = await res.json();
        agentID = data.agent_id;
        dbg('session ok agent_id=' + agentID);
        connectSSE(agentID);
      } catch (err) {
        dbg('init error: ' + err.message, true);
        setStatus('error: ' + err.message);
      }
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || !agentID) return;
      inputEl.value = '';
      appendMsg('user', text);

      const res = await fetch('/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, fingerprint }),
      });
      if (!res.ok) {
        appendMsg('assistant', '[error] message failed (' + res.status + ')');
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    init();
  </script>
</body>
</html>
